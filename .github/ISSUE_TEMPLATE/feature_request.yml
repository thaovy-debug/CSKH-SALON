name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature! Please describe your idea below.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought of?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Conversations
        - Knowledge Base
        - Channels (WhatsApp/Email/Phone)
        - AI / Tools
        - Automation
        - Analytics
        - API
        - Other
    validations:
      required: true
