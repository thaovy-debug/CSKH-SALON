<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px;
  height: 640px;
  background: linear-gradient(135deg, #1E293B 0%, #2D5A7B 50%, #4A7C9B 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}
.container {
  display: flex;
  align-items: center;
  gap: 60px;
}
.logo {
  width: 220px;
  height: 220px;
  border-radius: 32px;
  filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3));
}
.text {
  color: white;
}
.title {
  font-size: 72px;
  font-weight: 800;
  letter-spacing: -2px;
  margin-bottom: 12px;
}
.subtitle {
  font-size: 28px;
  font-weight: 400;
  color: rgba(255,255,255,0.8);
  margin-bottom: 32px;
}
.tags {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.tag {
  padding: 8px 18px;
  border-radius: 20px;
  background: rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.9);
  font-size: 16px;
  font-weight: 500;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>
<body>
  <div class="container">
    <img src="../public/owly.png" class="logo" />
    <div class="text">
      <div class="title">Owly</div>
      <div class="subtitle">AI-Powered Customer Support Agent</div>
      <div class="tags">
        <span class="tag">WhatsApp</span>
        <span class="tag">Email</span>
        <span class="tag">Phone</span>
        <span class="tag">Self-Hosted</span>
        <span class="tag">Open Source</span>
      </div>
    </div>
  </div>
</body>
</html>
